{% extends "base.html" %}
{% block title %}Login - Ridge LMS{% endblock %}
{% block body %}
<div class="auth-page auth-page--image">
    <div class="auth-container">
        <div class="auth-brand auth-brand--photo" style="background-image: url('{{ url_for('static', filename='images/hospital-bg.png') }}');">
            <div class="auth-brand-overlay"></div>
            <div class="auth-brand-content">
                <div class="brand-icon">+</div>
                <h1>Ridge Hospital</h1>
                <p>Leave Management System</p>
            </div>
        </div>
        <form id="loginForm" class="auth-form">
            <h2>Sign In</h2>
            <div id="loginError" class="alert alert-error hidden"></div>
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="e.g. NUR1024" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
            <p class="auth-hint">First login requires password change.</p>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}

{% extends "base.html" %}
{% block title %}Change Password - Ridge LMS{% endblock %}
{% block body %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <div class="brand-icon">🔒</div>
            <h1>Password Change Required</h1>
            <p>You must set a new password before continuing.</p>
        </div>
        <form id="changePasswordForm" class="auth-form">
            <div id="passwordError" class="alert alert-error hidden"></div>
            <div class="form-group">
                <label for="old_password">Current Password</label>
                <input type="password" id="old_password" required>
            </div>
            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" required minlength="8">
                <small>Minimum 8 characters. Cannot reuse recent passwords.</small>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='js/change_password.js') }}"></script>
{% endblock %}
